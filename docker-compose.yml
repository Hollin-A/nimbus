# Local one-shot demo: `docker compose up --build` brings the API and the
# frontend up together. NOT the production deployment — Render + Vercel
# build the same Dockerfiles individually (see docs/ARCHITECTURE.md).

services:
  backend:
    build:
      context: ./backend
    environment:
      - NODE_ENV=production
      # Real demos should set JWT_SECRET via env. The fallback here is a
      # non-default value so the production-mode check in config.ts passes,
      # but it is not a real secret — replace before any public deployment.
      - JWT_SECRET=${JWT_SECRET:-docker-compose-demo-not-a-real-secret}
      - JWT_EXPIRES_IN=2h
      - CORS_ORIGIN=http://localhost:8080
    ports:
      - "4000:4000"

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_URL=http://localhost:4000
        - VITE_SOCKET_URL=http://localhost:4000
    ports:
      - "8080:80"
    depends_on:
      - backend
